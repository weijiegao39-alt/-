<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0b1120"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="旅行者2.0"><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="icons/icon-192.png"><link rel="stylesheet" href="style.css"><title>旅行者2.0</title></head><body><header><h1>旅行者2.0</h1><button id="save">保存</button></header><main><section class="card"><h2 id="rank">行者</h2><p id="sub"></p><div class="bar"><i id="rpbar"></i></div><div class="stats"><b id="coins"></b><b id="a7"></b><b id="night"></b><b id="gate"></b></div></section><section class="card"><label>天气<select id="weather"></select></label><label>地图<select id="map"></select></label><p id="world"></p><p class="chaos" id="chaos"></p><button id="reroll">重抽混沌因子</button></section><nav><button data-tab="daily" class="on">日报</button><button data-tab="shop">浪花账</button><button data-tab="travel">旅行</button><button data-tab="boss">Boss</button><button data-tab="logs">日志</button></nav><section id="daily" class="card panel on"><h3>日报结算</h3><div id="form"></div><textarea id="note" placeholder="一句话战报/备注"></textarea><button id="settle" class="primary">生成战报并结算</button></section><section id="shop" class="card panel"><h3>浪花账兑换区</h3><p>非必要消费需今日主线≥30分钟且熄屏达标，否则挂账24小时。</p><div id="shopgrid" class="grid"></div></section><section id="travel" class="card panel"><h3>旅行驿站</h3><p id="travelinfo"></p><div id="travelgrid" class="grid"></div></section><section id="boss" class="card panel"><h3>Boss突破试炼</h3><div id="bossbox"></div></section><section id="logs" class="card panel"><h3>档案官日志</h3><pre id="logsbox"></pre><button id="clear" class="danger">清空日志</button></section></main><div id="toast"></div><script src="app.js"></script></body></html>
